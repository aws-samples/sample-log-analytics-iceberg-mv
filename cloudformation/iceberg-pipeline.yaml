AWSTemplateFormatVersion: "2010-09-09"

Description: >-
  Consolidated Iceberg data pipeline template. Provisions S3 storage buckets,
  IAM roles, an AWS Glue job for materialized view ETL, an Amazon Data Firehose
  delivery stream with Iceberg destination, a Lambda function for CloudWatch Logs
  processing, SQS dead-letter queues, and a subscription filter. Supports both
  Lake Formation and non-Lake Formation configurations via the EnableLakeFormation
  parameter.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "[REQUIRED] Must be reviewed/changed before deploying"
        Parameters:
          - CreateScriptBucket
          - EnableLakeFormation
          - CreateSubscriptionLogGroup
          - IcebergDataBucketName
          - IcebergErrorsBucketName
          - GlueScriptBucketName
          - LambdaScriptBucketName
          - SubscriptionLogGroupName
      - Label:
          default: "Safe defaults provided, only change if customizing"
        Parameters:
          - ResourceSuffix
          - DatabaseName
          - GlueJobRoleName
          - GlueJobName
          - WorkerType
          - NumberOfWorkers
          - WarehouseDatabaseName
          - FirehoseStreamName
          - FirehoseBufferSizeMBs
          - FirehoseBufferIntervalSeconds
          - StreamDatabaseName
          - StreamTableName
          - LambdaFunctionName
          - LambdaTimeout
          - LambdaMemorySize
          - LambdaFirehoseProcessorRoleName
          - FirehoseIcebergDeliveryRoleName
          - GlueJobTriggerFunctionName

Parameters:
  # ─────────────────────────────────────────────────────────────────────────────

  # ── Must be provided at deploy time ────────────────────────────────────────
  CreateScriptBucket:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: >-
      Set to false if a reusable artifactory bucket already exists in your account.
      When false, the stack will not create the bucket and will use the existing one.

  EnableLakeFormation:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Enable Lake Formation integration for the Glue job and S3 bucket policy"

  CreateSubscriptionLogGroup:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Set to true to create the subscription log group, false if it already exists"

  # S3 Buckets (must be globally unique across all AWS accounts)
  IcebergDataBucketName:
    Type: String
    Default: my-company-iceberg-data-bucket
    Description: >-
      Name for the S3 bucket that stores Apache Iceberg table data files.
      Must be globally unique across all AWS accounts and regions.
      Recommended pattern: {company}-{project}-{bucket-purpose}-{account-id}-{region}

  IcebergErrorsBucketName:
    Type: String
    Default: my-company-iceberg-errors-bucket
    Description: >-
      Name for the S3 bucket that captures failed records for troubleshooting and replay.
      Must be globally unique across all AWS accounts.

  GlueScriptBucketName:
    Type: String
    Default: my-company-glue-scripts-bucket
    Description: >-
      Name for the S3 bucket that stores the Glue ETL script.
      Must be globally unique across all AWS accounts and regions.

  LambdaScriptBucketName:
    Type: String
    Default: my-company-glue-scripts-bucket
    Description: >-
      S3 bucket containing the Lambda deployment package.
      Can reuse the same value as GlueScriptBucketName if storing all artifacts in one bucket.

  SubscriptionLogGroupName:
    Type: String
    Default: /aws/application/logs
    Description: >-
      CloudWatch Log Group name to subscribe to the Lambda function.
      Must match an existing or to-be-created log group in your account.

  # ── Safe defaults provided, review if customizing ───────────────────────────
  DatabaseName:
    Type: String
    Default: stream_analytics
    Description: "Glue Catalog database name for Iceberg tables and materialized views"

  GlueJobRoleName:
    Type: String
    Default: my-iceberg-glue-job-role
    Description: "Name for the IAM role assumed by AWS Glue jobs"

  GlueJobName:
    Type: String
    Default: my-iceberg-glue-job
    Description: "Name for the Glue job displayed in the AWS console"

  WorkerType:
    Type: String
    Default: G.1X
    Description: "Glue worker instance type (G.1X, G.2X, G.4X, etc.)"

  NumberOfWorkers:
    Type: Number
    Default: 2
    Description: "Number of Glue workers allocated to the job"

  WarehouseDatabaseName:
    Type: String
    Default: stream_analytics
    Description: "Database name used in the Iceberg warehouse S3 path (s3://bucket/{name}.db)"

  FirehoseStreamName:
    Type: String
    Default: iceberg-logs-stream
    Description: "Name for the Amazon Data Firehose delivery stream"

  FirehoseBufferSizeMBs:
    Type: Number
    Default: 5
    Description: "Firehose buffer size in MBs before delivery"

  FirehoseBufferIntervalSeconds:
    Type: Number
    Default: 30
    Description: "Firehose buffer interval in seconds before delivery"

  StreamDatabaseName:
    Type: String
    Default: stream_analytics
    Description: "Glue Catalog database name for the Firehose Iceberg destination"

  StreamTableName:
    Type: String
    Default: application_logs
    Description: "Glue Catalog table name for the Firehose Iceberg destination"

  LambdaFunctionName:
    Type: String
    Default: CloudWatchLogsToIceberg
    Description: "Name for the Lambda function that processes CloudWatch Logs"

  LambdaTimeout:
    Type: Number
    Default: 300
    Description: "Lambda function timeout in seconds"

  LambdaMemorySize:
    Type: Number
    Default: 512
    Description: "Lambda function memory size in MB"

  LambdaFirehoseProcessorRoleName:
    Type: String
    Default: LambdaFirehoseProcessorRole
    Description: "Name for the IAM role used by the Lambda function"

  FirehoseIcebergDeliveryRoleName:
    Type: String
    Default: FirehoseIcebergDeliveryRole
    Description: "Name for the IAM role used by the Firehose delivery stream"

  GlueJobTriggerFunctionName:
    Type: String
    Default: iceberg-glue-job-trigger
    Description: "Name for the Lambda function that triggers and polls the Glue job"

  ResourceSuffix:
    Type: String
    Default: ""
    Description: >-
      Optional custom suffix for resource names (e.g. 'prod', 'teamalpha').
      Leave blank to auto-generate a timestamp at deploy time.
      Use only lowercase letters and numbers (no hyphens or underscores)
      to ensure compatibility with both S3 bucket names and Glue database identifiers.

Conditions:
  LakeFormationEnabled: !Equals [!Ref EnableLakeFormation, "true"]
  UseCustomSuffix: !Not [!Equals [!Ref ResourceSuffix, ""]]
  ShouldCreateSubscriptionLogGroup: !Equals [!Ref CreateSubscriptionLogGroup, "true"]
  ShouldCreateScriptBucket: !Equals [!Ref CreateScriptBucket, "true"]

Resources:
  # ── Timestamp Generator ───────────────────────────────────────────────────
  TimestampGeneratorRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  TimestampGeneratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 10
      Role: !GetAtt TimestampGeneratorRole.Arn
      Code:
        ZipFile: |
          import json, datetime
          from urllib.request import urlopen, Request
          def handler(event, context):
              if event['RequestType'] in ('Update', 'Delete'):
                  ts = event.get('PhysicalResourceId', datetime.datetime.now().strftime('%Y%m%d%H%M%S'))
              else:
                  ts = datetime.datetime.now().strftime('%Y%m%d%H%M%S')
              body = json.dumps({
                  'Status': 'SUCCESS',
                  'PhysicalResourceId': ts,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': {'Value': ts}
              }).encode()
              urlopen(Request(event['ResponseURL'], data=body, method='PUT',
                  headers={'Content-Type': '', 'Content-Length': str(len(body))}))

  TimestampResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt TimestampGeneratorFunction.Arn

  # ── S3 Buckets ────────────────────────────────────────────────────────────
  IcebergDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub
        - ${IcebergDataBucketName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  IcebergDataBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref IcebergDataBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: !If [LakeFormationEnabled, LakeFormationDataAccess, GlueJobAccess]
            Effect: Allow
            Principal:
              AWS: !If
                - LakeFormationEnabled
                - !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/lakeformation.amazonaws.com/AWSServiceRoleForLakeFormationDataAccess
                - !GetAtt GlueJobRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !Sub
                - arn:aws:s3:::${IcebergDataBucketName}-${Timestamp}
                - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
              - !Sub
                - arn:aws:s3:::${IcebergDataBucketName}-${Timestamp}/*
                - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]

  IcebergErrorsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub
        - ${IcebergErrorsBucketName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  GlueScriptBucket:
    Type: AWS::S3::Bucket
    Condition: ShouldCreateScriptBucket
    Properties:
      BucketName: !Sub
        - ${GlueScriptBucketName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── Glue Job IAM Role ───────────────────────────────────────────────────
  GlueJobRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - ${GlueJobRoleName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: glue-access-formv
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - glue:CreateTable
                  - glue:UpdateTable
                  - glue:GetTable
                  - glue:GetTables
                Resource:
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog
                  - !Sub
                    - arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${DatabaseName}_${Timestamp}
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
                  - !Sub
                    - arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${DatabaseName}_${Timestamp}/*
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
        - PolicyName: iam-pass-role
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub
                    - arn:aws:iam::${AWS::AccountId}:role/${GlueJobRoleName}-${Timestamp}
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
        - !If
          - LakeFormationEnabled
          - PolicyName: lake-formation-access
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: Allow
                  Action:
                    - lakeformation:GetDataAccess
                    - lakeformation:GetTemporaryGluePartitionCredentials
                    - lakeformation:GetTemporaryGlueTableCredentials
                  Resource: "*"
          - !Ref AWS::NoValue
        - PolicyName: iceberg-s3-emr-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - arn:aws:s3:::${IcebergDataBucketName}-${Timestamp}
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
                  - !Sub
                    - arn:aws:s3:::${IcebergDataBucketName}-${Timestamp}/*
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
                  - !Sub
                    - arn:aws:s3:::${IcebergErrorsBucketName}-${Timestamp}
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
                  - !Sub
                    - arn:aws:s3:::${IcebergErrorsBucketName}-${Timestamp}/*
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
              - Effect: Allow
                Action: "elasticmapreduce:*"
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:PrincipalAccount: !Sub ${AWS::AccountId}
        - PolicyName: glue-script-bucket-read
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub
                    - arn:aws:s3:::${GlueScriptBucketName}-${Timestamp}/*
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]

  # ── Glue Job ────────────────────────────────────────────────────────────
  IcebergGlueJob:
    Type: AWS::Glue::Job
    DependsOn: ArtifactUploaderCustomResource
    Properties:
      Name: !Sub
        - ${GlueJobName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      Role: !GetAtt GlueJobRole.Arn
      GlueVersion: "5.1"
      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - s3://${GlueScriptBucketName}-${Timestamp}/scripts/sample-glue-job-iceberg-materializedview-builder.py
          - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      WorkerType: !Ref WorkerType
      NumberOfWorkers: !Ref NumberOfWorkers
      DefaultArguments:
        --conf: !Sub
          - >-
            spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
            --conf spark.sql.catalog.glue_catalog=org.apache.iceberg.spark.SparkCatalog
            --conf spark.sql.catalog.glue_catalog.type=glue
            --conf spark.sql.catalog.glue_catalog.warehouse=s3://${IcebergDataBucketName}-${Timestamp}/${WarehouseDatabaseName}_${Timestamp}.db
            --conf spark.sql.catalog.glue_catalog.glue.region=${AWS::Region}
            --conf spark.sql.catalog.glue_catalog.glue.id=${AWS::AccountId}
            --conf spark.sql.catalog.glue_catalog.glue.account-id=${AWS::AccountId}
            --conf spark.sql.catalog.glue_catalog.client.region=${AWS::Region}
            --conf spark.sql.catalog.glue_catalog.glue.lakeformation-enabled=${LakeFormationValue}
            --conf spark.sql.defaultCatalog=glue_catalog
            --conf spark.sql.optimizer.answerQueriesWithMVs.enabled=true
            --conf spark.sql.materializedViews.metadataCache.enabled=true
          - LakeFormationValue: !If [LakeFormationEnabled, "true", "false"]
            Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
        --datalake-formats: iceberg
        --iceberg-data-bucket: !Sub
          - ${IcebergDataBucketName}-${Timestamp}
          - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
        --warehouse-database-name: !Sub
          - ${WarehouseDatabaseName}_${Timestamp}
          - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
        --stream-table-name: !Ref StreamTableName

  # ── Glue MV Refresh Job ───────────────────────────────────────────────
  IcebergGlueMVRefreshJob:
    Type: AWS::Glue::Job
    DependsOn: ArtifactUploaderCustomResource
    Properties:
      Name: !Sub
        - ${GlueJobName}-mv-refresh-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      Role: !GetAtt GlueJobRole.Arn
      GlueVersion: "5.1"
      Command:
        Name: glueetl
        ScriptLocation: !Sub
          - s3://${GlueScriptBucketName}-${Timestamp}/scripts/glue-job-mv-refresh.py
          - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      WorkerType: !Ref WorkerType
      NumberOfWorkers: !Ref NumberOfWorkers
      DefaultArguments:
        --conf: !Sub
          - >-
            spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
            --conf spark.sql.catalog.glue_catalog=org.apache.iceberg.spark.SparkCatalog
            --conf spark.sql.catalog.glue_catalog.type=glue
            --conf spark.sql.catalog.glue_catalog.warehouse=s3://${IcebergDataBucketName}-${Timestamp}/${WarehouseDatabaseName}_${Timestamp}.db
            --conf spark.sql.catalog.glue_catalog.glue.region=${AWS::Region}
            --conf spark.sql.catalog.glue_catalog.glue.id=${AWS::AccountId}
            --conf spark.sql.catalog.glue_catalog.glue.account-id=${AWS::AccountId}
            --conf spark.sql.catalog.glue_catalog.client.region=${AWS::Region}
            --conf spark.sql.catalog.glue_catalog.glue.lakeformation-enabled=${LakeFormationValue}
            --conf spark.sql.defaultCatalog=glue_catalog
            --conf spark.sql.optimizer.answerQueriesWithMVs.enabled=true
            --conf spark.sql.materializedViews.metadataCache.enabled=true
          - LakeFormationValue: !If [LakeFormationEnabled, "true", "false"]
            Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
        --datalake-formats: iceberg
        --iceberg-data-bucket: !Sub
          - ${IcebergDataBucketName}-${Timestamp}
          - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
        --warehouse-database-name: !Sub
          - ${WarehouseDatabaseName}_${Timestamp}
          - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
        --stream-table-name: !Ref StreamTableName

  # ── Scheduled MV Refresh Trigger ─────────────────────────────────────────
  MVRefreshScheduleTrigger:
    Type: AWS::Glue::Trigger
    DependsOn: IcebergGlueMVRefreshJob
    Properties:
      Name: !Sub
        - ${GlueJobName}-mv-refresh-schedule-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      Type: SCHEDULED
      Schedule: "cron(0 0 * * ? *)"
      StartOnCreation: true
      Actions:
        - JobName: !Sub
            - ${GlueJobName}-mv-refresh-${Timestamp}
            - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]

  # ── Application Log Group (conditional) ─────────────────────────────────
  ApplicationLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: ShouldCreateSubscriptionLogGroup
    Properties:
      LogGroupName: !Ref SubscriptionLogGroupName
      RetentionInDays: 14

  ApplicationLogStream:
    Type: AWS::Logs::LogStream
    Condition: ShouldCreateSubscriptionLogGroup
    DependsOn: ApplicationLogGroup
    Properties:
      LogGroupName: !Ref SubscriptionLogGroupName
      LogStreamName: test-stream

  # ── Firehose Log Group and Stream ───────────────────────────────────────
  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub
        - /aws/kinesisfirehose/${FirehoseStreamName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      RetentionInDays: 14

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    DependsOn: FirehoseLogGroup
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: IcebergDelivery

  # ── IAM Roles ───────────────────────────────────────────────────────────
  LambdaFirehoseProcessorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - ${LambdaFirehoseProcessorRoleName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      Description: Allows Lambda to process CloudWatch Logs and write to Firehose
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: FirehoseWriteAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - firehose:PutRecord
                  - firehose:PutRecordBatch
                Resource: !Sub
                  - arn:aws:firehose:${AWS::Region}:${AWS::AccountId}:deliverystream/${FirehoseStreamName}-${Timestamp}
                  - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
        - PolicyName: DLQWriteAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt FailedEventsQueue.Arn
                  - !GetAtt PermanentFailureQueue.Arn

  FirehoseIcebergDeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - ${FirehoseIcebergDeliveryRoleName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3AndGlueAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - arn:aws:s3:::${IcebergDataBucketName}-${Timestamp}
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
                  - !Sub
                    - arn:aws:s3:::${IcebergDataBucketName}-${Timestamp}/*
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
                  - !Sub
                    - arn:aws:s3:::${IcebergErrorsBucketName}-${Timestamp}
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
                  - !Sub
                    - arn:aws:s3:::${IcebergErrorsBucketName}-${Timestamp}/*
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
              - Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetTableVersion
                  - glue:GetTableVersions
                  - glue:GetDatabase
                  - glue:GetDatabases
                  - glue:UpdateTable
                Resource:
                  - !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog
                  - !Sub
                    - arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${StreamDatabaseName}_${Timestamp}
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
                  - !Sub
                    - arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${StreamDatabaseName}_${Timestamp}/*
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub
                  - arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/kinesisfirehose/${FirehoseStreamName}-${Timestamp}:*
                  - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
              - Effect: Allow
                Action:
                  - lakeformation:GetDataAccess
                Resource: "*"

  # ── Glue Job Trigger IAM Role ─────────────────────────────────────────────
  GlueJobTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: GlueJobAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - glue:StartJobRun
                  - glue:GetJobRun
                Resource:
                  - !Sub
                    - arn:aws:glue:${AWS::Region}:${AWS::AccountId}:job/${GlueJobName}-${Timestamp}
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]

  # ── Glue Job Trigger Lambda Function ────────────────────────────────────
  GlueJobTriggerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub
        - ${GlueJobTriggerFunctionName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      Runtime: python3.12
      Handler: index.handler
      Timeout: 900
      Role: !GetAtt GlueJobTriggerRole.Arn
      Code:
        ZipFile: |
          import boto3
          import json
          import time
          from urllib.request import urlopen, Request

          def send_response(event, context, status, reason=''):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f'See CloudWatch Log Stream: {context.log_stream_name}',
                  'PhysicalResourceId': context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId']
              }).encode('utf-8')
              req = Request(event['ResponseURL'], data=body, method='PUT')
              req.add_header('Content-Type', '')
              req.add_header('Content-Length', str(len(body)))
              urlopen(req)

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      send_response(event, context, 'SUCCESS')
                      return
                  glue = boto3.client('glue')
                  job_name = event['ResourceProperties']['GlueJobName']
                  response = glue.start_job_run(JobName=job_name)
                  run_id = response['JobRunId']
                  while True:
                      time.sleep(30)
                      result = glue.get_job_run(JobName=job_name, RunId=run_id)
                      state = result['JobRun']['JobRunState']
                      if state == 'SUCCEEDED':
                          send_response(event, context, 'SUCCESS')
                          return
                      elif state in ['FAILED', 'ERROR', 'TIMEOUT', 'STOPPED']:
                          send_response(event, context, 'FAILED', f'Glue job ended with state: {state}')
                          return
              except Exception as e:
                  send_response(event, context, 'FAILED', str(e))

  # ── Glue Job Trigger Custom Resource ──────────────────────────────────────
  GlueJobTriggerCustomResource:
    Type: AWS::CloudFormation::CustomResource
    DependsOn: IcebergGlueJob
    Properties:
      ServiceToken: !GetAtt GlueJobTriggerFunction.Arn
      GlueJobName: !Sub
        - ${GlueJobName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]

  # ── Artifact Uploader IAM Role ───────────────────────────────────────────
  ArtifactUploaderRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ArtifactUploadPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub
                    - arn:aws:s3:::${GlueScriptBucketName}-${Timestamp}/scripts/*
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
                  - !Sub
                    - arn:aws:s3:::${LambdaScriptBucketName}-${Timestamp}/lambda/*
                    - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]

  # ── Artifact Uploader Lambda Function ──────────────────────────────────
  ArtifactUploaderFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 120
      Role: !GetAtt ArtifactUploaderRole.Arn
      Code:
        ZipFile: |
          import json,boto3,base64,zlib,zipfile,io
          from urllib.request import urlopen,Request
          def send(event,ctx,status,reason=''):
              body=json.dumps({'Status':status,'Reason':reason or ctx.log_stream_name,'PhysicalResourceId':ctx.log_stream_name,'StackId':event['StackId'],'RequestId':event['RequestId'],'LogicalResourceId':event['LogicalResourceId']}).encode()
              urlopen(Request(event['ResponseURL'],data=body,method='PUT',headers={'Content-Type':'','Content-Length':str(len(body))}))
          def handler(event,context):
              try:
                  if event['RequestType']=='Delete':
                      send(event,context,'SUCCESS');return
                  p=event['ResourceProperties']
                  s3=boto3.client('s3')
                  for k,key in [('GlueScriptEncoded','scripts/sample-glue-job-iceberg-materializedview-builder.py'),('MVRefreshScriptEncoded','scripts/glue-job-mv-refresh.py'),('LambdaScriptEncoded',None)]:
                      raw=zlib.decompress(base64.b64decode(p[k]))
                      if key:
                          s3.put_object(Bucket=p['GlueBucket'],Key=key,Body=raw)
                      else:
                          buf=io.BytesIO()
                          with zipfile.ZipFile(buf,'w',zipfile.ZIP_DEFLATED) as zf:
                              zf.writestr('lambda_function.py',raw)
                          buf.seek(0)
                          s3.put_object(Bucket=p['LambdaBucket'],Key='lambda/lambda_function.zip',Body=buf.read())
                  send(event,context,'SUCCESS')
              except Exception as e:
                  send(event,context,'FAILED',str(e))


  # ── Artifact Uploader Custom Resource ────────────────────────────────────
  ArtifactUploaderCustomResource:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt ArtifactUploaderFunction.Arn
      GlueBucket: !Sub
        - ${GlueScriptBucketName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      LambdaBucket: !Sub
        - ${LambdaScriptBucketName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      BucketDependency: !If [ShouldCreateScriptBucket, !Ref GlueScriptBucket, "existing"]
      GlueScriptEncoded: 
      MVRefreshScriptEncoded: 
      LambdaScriptEncoded: 
  # ── Firehose Delivery Stream ────────────────────────────────────────────
  IcebergFirehoseStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    DependsOn:
      - FirehoseIcebergDeliveryRole
      - FirehoseLogStream
      - GlueJobTriggerCustomResource
    Properties:
      DeliveryStreamName: !Sub
        - ${FirehoseStreamName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      DeliveryStreamType: DirectPut
      IcebergDestinationConfiguration:
        RoleARN: !GetAtt FirehoseIcebergDeliveryRole.Arn
        CatalogConfiguration:
          CatalogARN: !Sub arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog
        DestinationTableConfigurationList:
          - DestinationDatabaseName: !Sub
              - ${StreamDatabaseName}_${Timestamp}
              - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
            DestinationTableName: !Ref StreamTableName
        BufferingHints:
          SizeInMBs: !Ref FirehoseBufferSizeMBs
          IntervalInSeconds: !Ref FirehoseBufferIntervalSeconds
        S3Configuration:
          RoleARN: !GetAtt FirehoseIcebergDeliveryRole.Arn
          BucketARN: !Sub
            - arn:aws:s3:::${IcebergDataBucketName}-${Timestamp}
            - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
          Prefix: !Sub ${StreamTableName}/data/
          ErrorOutputPrefix: !Sub ${StreamTableName}/errors/
          CompressionFormat: UNCOMPRESSED
        ProcessingConfiguration:
          Enabled: false
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: IcebergDelivery
        RetryOptions:
          DurationInSeconds: 3600

  # ── Dead Letter Queue for Failed Lambda Invocations ──────────────────────
  PermanentFailureQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub
        - ${LambdaFunctionName}-permanent-failures-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  FailedEventsQueue:
    Type: AWS::SQS::Queue
    DependsOn: PermanentFailureQueue
    Properties:
      QueueName: !Sub
        - ${LambdaFunctionName}-failed-events-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      MessageRetentionPeriod: 1209600
      VisibilityTimeout: 300
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt PermanentFailureQueue.Arn
        maxReceiveCount: 3

  # ── Lambda Function ─────────────────────────────────────────────────────
  CloudWatchLogsToIcebergFunction:
    Type: AWS::Lambda::Function
    DependsOn:
      - LambdaFirehoseProcessorRole
      - FailedEventsQueue
      - ArtifactUploaderCustomResource
    Properties:
      FunctionName: !Sub
        - ${LambdaFunctionName}-${Timestamp}
        - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaFirehoseProcessorRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemorySize
      Description: Processes CloudWatch Logs and sends to Firehose for Iceberg delivery
      DeadLetterConfig:
        TargetArn: !GetAtt FailedEventsQueue.Arn
      Environment:
        Variables:
          FIREHOSE_STREAM_NAME: !Sub
            - ${FirehoseStreamName}-${Timestamp}
            - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
      Code:
        S3Bucket: !Sub
          - ${LambdaScriptBucketName}-${Timestamp}
          - Timestamp: !If [UseCustomSuffix, !Ref ResourceSuffix, !GetAtt TimestampResource.Value]
        S3Key: lambda/lambda_function.zip

  # ── Subscription Filter ─────────────────────────────────────────────────
  CloudWatchLogsInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: ShouldCreateSubscriptionLogGroup
    Properties:
      FunctionName: !GetAtt CloudWatchLogsToIcebergFunction.Arn
      Action: lambda:InvokeFunction
      Principal: logs.amazonaws.com
      SourceArn: !Sub arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:${SubscriptionLogGroupName}:*

  IcebergStreamingSubscriptionFilter:
    Type: AWS::Logs::SubscriptionFilter
    Condition: ShouldCreateSubscriptionLogGroup
    DependsOn:
      - CloudWatchLogsInvokePermission
    Properties:
      LogGroupName: !Ref SubscriptionLogGroupName
      FilterName: IcebergStreamingFilter
      FilterPattern: ""
      DestinationArn: !GetAtt CloudWatchLogsToIcebergFunction.Arn

  # ── DLQ Reprocessing ────────────────────────────────────────────────────
  DLQEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt FailedEventsQueue.Arn
      FunctionName: !GetAtt CloudWatchLogsToIcebergFunction.Arn
      BatchSize: 5
      Enabled: true
