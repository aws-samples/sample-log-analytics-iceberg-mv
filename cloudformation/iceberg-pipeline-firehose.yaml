AWSTemplateFormatVersion: "2010-09-09"

Description: >-
  Provisions the streaming ingestion pipeline for the Iceberg data platform,
  including the scripts S3 bucket, Firehose log group, IAM roles for Lambda
  and Firehose, an Amazon Data Firehose delivery stream with Iceberg destination,
  a Lambda function for CloudWatch Logs processing, and a subscription filter.
  Deploy this stack AFTER the Glue job has created the Iceberg table.

Parameters:
  AccountId:
    Type: String
    Description: AWS account ID used in IAM policy resource ARNs

  Region:
    Type: String
    Default: us-east-1
    Description: AWS region for constructing resource ARNs

  IcebergDataBucketName:
    Type: String
    Default: my-company-iceberg-data-bucket
    Description: Name of the S3 bucket that stores Apache Iceberg table data files

  IcebergErrorsBucketName:
    Type: String
    Default: my-company-iceberg-errors-bucket
    Description: Name of the S3 bucket that captures failed records

  FirehoseStreamName:
    Type: String
    Default: iceberg-logs-stream
    Description: Name for the Amazon Data Firehose delivery stream

  FirehoseBufferSizeMBs:
    Type: Number
    Default: 5
    Description: Firehose buffer size in MBs before delivery

  FirehoseBufferIntervalSeconds:
    Type: Number
    Default: 30
    Description: Firehose buffer interval in seconds before delivery

  StreamDatabaseName:
    Type: String
    Default: stream_analytics
    Description: Glue Catalog database name for the Firehose Iceberg destination

  StreamTableName:
    Type: String
    Default: application_logs
    Description: Glue Catalog table name for the Firehose Iceberg destination

  LambdaFunctionName:
    Type: String
    Default: CloudWatchLogsToIceberg
    Description: Name for the Lambda function that processes CloudWatch Logs

  LambdaScriptBucketName:
    Type: String
    Default: my-company-glue-scripts-bucket
    Description: S3 bucket containing the Lambda deployment package

  LambdaTimeout:
    Type: Number
    Default: 300
    Description: Lambda function timeout in seconds

  LambdaMemorySize:
    Type: Number
    Default: 512
    Description: Lambda function memory size in MB

  SubscriptionLogGroupName:
    Type: String
    Default: /aws/application/logs
    Description: CloudWatch Log Group name to subscribe to the Lambda function

  CreateSubscriptionLogGroup:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Set to true to create the subscription log group, false if it already exists

  LambdaFirehoseProcessorRoleName:
    Type: String
    Default: LambdaFirehoseProcessorRole
    Description: Name for the IAM role used by the Lambda function

  FirehoseIcebergDeliveryRoleName:
    Type: String
    Default: FirehoseIcebergDeliveryRole
    Description: Name for the IAM role used by the Firehose delivery stream

Conditions:
  ShouldCreateSubscriptionLogGroup: !Equals [!Ref CreateSubscriptionLogGroup, "true"]

Resources:
  # ── Application Log Group (conditional) ─────────────────────────────────
  ApplicationLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: ShouldCreateSubscriptionLogGroup
    Properties:
      LogGroupName: !Ref SubscriptionLogGroupName
      RetentionInDays: 14

  ApplicationLogStream:
    Type: AWS::Logs::LogStream
    Condition: ShouldCreateSubscriptionLogGroup
    DependsOn: ApplicationLogGroup
    Properties:
      LogGroupName: !Ref SubscriptionLogGroupName
      LogStreamName: test-stream

  # ── Firehose Log Group and Stream ───────────────────────────────────────
  FirehoseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/kinesisfirehose/${FirehoseStreamName}
      RetentionInDays: 14

  FirehoseLogStream:
    Type: AWS::Logs::LogStream
    DependsOn: FirehoseLogGroup
    Properties:
      LogGroupName: !Ref FirehoseLogGroup
      LogStreamName: IcebergDelivery

  # ── IAM Roles ───────────────────────────────────────────────────────────
  LambdaFirehoseProcessorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref LambdaFirehoseProcessorRoleName
      Description: Allows Lambda to process CloudWatch Logs and write to Firehose
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: FirehoseWriteAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - firehose:PutRecord
                  - firehose:PutRecordBatch
                Resource: !Sub arn:aws:firehose:${Region}:${AccountId}:deliverystream/${FirehoseStreamName}

  FirehoseIcebergDeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref FirehoseIcebergDeliveryRoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3AndGlueAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${IcebergDataBucketName}
                  - !Sub arn:aws:s3:::${IcebergDataBucketName}/*
                  - !Sub arn:aws:s3:::${IcebergErrorsBucketName}
                  - !Sub arn:aws:s3:::${IcebergErrorsBucketName}/*
              - Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetTableVersion
                  - glue:GetTableVersions
                  - glue:UpdateTable
                Resource:
                  - !Sub arn:aws:glue:${Region}:${AccountId}:catalog
                  - !Sub arn:aws:glue:${Region}:${AccountId}:database/${StreamDatabaseName}
                  - !Sub arn:aws:glue:${Region}:${AccountId}:table/${StreamDatabaseName}/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub arn:aws:logs:${Region}:${AccountId}:log-group:/aws/kinesisfirehose/${FirehoseStreamName}:*
              - Effect: Allow
                Action:
                  - lakeformation:GetDataAccess
                Resource: "*"

  # ── Firehose Delivery Stream ────────────────────────────────────────────
  IcebergFirehoseStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    DependsOn:
      - FirehoseIcebergDeliveryRole
      - FirehoseLogStream
    Properties:
      DeliveryStreamName: !Ref FirehoseStreamName
      DeliveryStreamType: DirectPut
      IcebergDestinationConfiguration:
        RoleARN: !GetAtt FirehoseIcebergDeliveryRole.Arn
        CatalogConfiguration:
          CatalogARN: !Sub arn:aws:glue:${Region}:${AccountId}:catalog
        DestinationTableConfigurationList:
          - DestinationDatabaseName: !Ref StreamDatabaseName
            DestinationTableName: !Ref StreamTableName
        BufferingHints:
          SizeInMBs: !Ref FirehoseBufferSizeMBs
          IntervalInSeconds: !Ref FirehoseBufferIntervalSeconds
        S3Configuration:
          RoleARN: !GetAtt FirehoseIcebergDeliveryRole.Arn
          BucketARN: !Sub arn:aws:s3:::${IcebergDataBucketName}
          Prefix: !Sub ${StreamTableName}/data/
          ErrorOutputPrefix: !Sub ${StreamTableName}/errors/
          CompressionFormat: UNCOMPRESSED
        ProcessingConfiguration:
          Enabled: false
        CloudWatchLoggingOptions:
          Enabled: true
          LogGroupName: !Ref FirehoseLogGroup
          LogStreamName: IcebergDelivery
        RetryOptions:
          DurationInSeconds: 3600

  # ── Lambda Function ─────────────────────────────────────────────────────
  CloudWatchLogsToIcebergFunction:
    Type: AWS::Lambda::Function
    DependsOn: LambdaFirehoseProcessorRole
    Properties:
      FunctionName: !Ref LambdaFunctionName
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaFirehoseProcessorRole.Arn
      Timeout: !Ref LambdaTimeout
      MemorySize: !Ref LambdaMemorySize
      Description: Processes CloudWatch Logs and sends to Firehose for Iceberg delivery
      Environment:
        Variables:
          FIREHOSE_STREAM_NAME: !Ref FirehoseStreamName
      Code:
        S3Bucket: !Ref LambdaScriptBucketName
        S3Key: lambda/lambda_function.zip

  # ── Subscription Filter ─────────────────────────────────────────────────
  CloudWatchLogsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CloudWatchLogsToIcebergFunction.Arn
      Action: lambda:InvokeFunction
      Principal: logs.amazonaws.com
      SourceArn: !Sub arn:aws:logs:${Region}:${AccountId}:log-group:${SubscriptionLogGroupName}:*

  IcebergStreamingSubscriptionFilter:
    Type: AWS::Logs::SubscriptionFilter
    DependsOn:
      - CloudWatchLogsInvokePermission
    Properties:
      LogGroupName: !Ref SubscriptionLogGroupName
      FilterName: IcebergStreamingFilter
      FilterPattern: ""
      DestinationArn: !GetAtt CloudWatchLogsToIcebergFunction.Arn
